# Docker全局基础网络配置
docker:
  network_name: "opsvault-net"
  cidr: "172.28.0.0/16"
  data_root: "/data/opsvault"
  # 全局默认资源限制
  resource_limit:
    cpu_max: "2"
    mem_max: "2g"

# 各 Docker 中间件的具体配置
mysql:
  image: "mysql:8.0"
  port: 3306
  root_password: "root"

redis:
  image: "redis:7-alpine"
  port: 6379
  password: ""

rabbitmq:
  image: "rabbitmq:3-management"
  port: 5672
  ui_port: 15672
  admin_user: "admin"
  admin_pwd: "password"

rocketmq:
  image: "apache/rocketmq:5.3.0"
  namesrv_port: 9876
  broker_port: 10911

postgres:
  image: "postgres:15"
  port: 5432
  password: ""

# Nginx Binary 部署配置
nginx:
  install_path: "/usr/local/nginx"
  www_root: "/data/wwwroot"
  ssl_root: "/data/ssl"
  wwwlogs_root: "/data/wwwlogs"
  source_root: "/usr/local/src/opsvault-nginx"
  version: "1.31.0"
  pcre_version: "8.45"
  openssl_version: "1.1.1w"
  run_user: "www"
  run_group: "www"
  systemd_unit_path: "/lib/systemd/system/nginx.service"
  logrotate_path: "/etc/logrotate.d/nginx"

log:
  level: info
  storage_path: "/data/opsvault/logs"

